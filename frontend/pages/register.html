<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký - GymStore</title>
    <link rel="stylesheet" href="../styles/main.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="auth-body">
    <div class="auth-container">
      <a href="../index.html" class="auth-logo">
        <i class="fas fa-dumbbell"></i> GYMSTORE
      </a>
      <div class="auth-title">Tạo tài khoản mới</div>

      <div
        id="error-message"
        style="
          background: #ffe6e6;
          color: #d63031;
          padding: 10px;
          border-radius: 4px;
          font-size: 13px;
          display: none;
          margin-bottom: 15px;
          border: 1px solid red;
        "
      ></div>

      <form id="register-form" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Họ và tên</label>
          <input
            type="text"
            id="username"
            class="form-control"
            placeholder="Ví dụ: Nguyễn Văn A"
            required
          />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            id="email"
            class="form-control"
            placeholder="email@example.com"
            required
          />
        </div>

        <div class="form-group">
          <label>Mật khẩu</label>
          <input
            type="password"
            id="password"
            class="form-control"
            placeholder="Tạo mật khẩu"
            required
          />
        </div>

        <div class="form-group">
          <label>Xác nhận mật khẩu</label>
          <input
            type="password"
            id="confirm-password"
            class="form-control"
            placeholder="Nhập lại mật khẩu"
            required
          />
        </div>

        <button type="submit" class="btn-auth btn-submit">ĐĂNG KÝ</button>
      </form>

      <div class="auth-footer">
        Đã có tài khoản? <a href="login.html">Đăng nhập</a>
      </div>
    </div>

    <script>
      // Server endpoint configuration
      const API_BASE = "http://localhost:5000/api";

      async function handleRegister(event) {
        console.log("Register button clicked");
        event.preventDefault();

        // Read form values
        const username = document.getElementById("username").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const confirmPassword =
          document.getElementById("confirm-password").value;

        const errorMsg = document.getElementById("error-message");
        const btnSubmit = document.querySelector(".btn-submit");

        // Reset error state
        errorMsg.style.display = "none";
        errorMsg.innerText = "";

        // Validate password confirmation
        if (password !== confirmPassword) {
          errorMsg.innerText = "Mật khẩu xác nhận không khớp.";
          errorMsg.style.display = "block";
          return;
        }

        // Khoa nut
        btnSubmit.innerText = "Đang xử lý...";
        btnSubmit.disabled = true;

        try {
          console.log("Gọi API đăng ký:", `${API_BASE}/auth/register`);

          // Gửi yêu cầu đến máy chủ
          const res = await fetch(`${API_BASE}/auth/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            // Backend expects name, email and password
            body: JSON.stringify({ name: username, email, password }),
          });

          const data = await res.json();
          console.log("Response:", data);

          if (res.ok || data.success) {
            alert("Đăng ký thành công. Vui lòng đăng nhập.");
            window.location.href = "login.html";
          } else {
            throw new Error(data.message || "Đăng ký thất bại");
          }
        } catch (err) {
          console.error("Error:", err);
          errorMsg.innerText = err.message || "Lỗi kết nối máy chủ";
          errorMsg.style.display = "block";
        } finally {
          // Restore button state
          btnSubmit.innerText = "ĐĂNG KÝ";
          btnSubmit.disabled = false;
        }
      }
    </script>
  </body>
</html>
